<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Join Splitora - Smart Expense Splitting</title>
 <link rel="stylesheet" href="css/form.css">
</head>

<body>
 <a href="index.html" class="back-home">← Back to Home</a>
 <div class="container">
  <div class="logo">💰 Splitora</div>
  <h2 id="form-title">Create Account</h2>
  <p class="subtitle" id="form-subtitle">Start splitting expenses with ease today.</p>

  <form id="auth-form" onsubmit="handleAuth(event)">
   <div class="form-group" id="name-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="John Doe">
   </div>

   <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="john@example.com" required>
   </div>

   <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" required>
   </div>

   <button type="submit" class="btn-submit" id="submit-btn">Sign Up</button>
  </form>

  <div class="toggle-form">
   <span id="toggle-text">Already have an account?</span>
   <a href="#" id="toggle-link" onclick="toggleAuth()">Log In</a>
  </div>
 </div>

 <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
 <script>
  (function() {
   emailjs.init("YOUR_PUBLIC_KEY"); // Replace with your real EmailJS Public Key
  })();

  let isLogin = false;

  function validateEmail(email) {
   const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
   return re.test(email);
  }

  function toggleAuth() {
   isLogin = !isLogin;
   const title = document.getElementById('form-title');
   const subtitle = document.getElementById('form-subtitle');
   const nameGroup = document.getElementById('name-group');
   const submitBtn = document.getElementById('submit-btn');
   const toggleText = document.getElementById('toggle-text');
   const toggleLink = document.getElementById('toggle-link');

   if (isLogin) {
    title.innerText = 'Welcome Back';
    subtitle.innerText = 'Log in to manage your group expenses.';
    nameGroup.style.display = 'none';
    submitBtn.innerText = 'Log In';
    toggleText.innerText = "Don't have an account?";
    toggleLink.innerText = 'Sign Up';
   } else {
    title.innerText = 'Create Account';
    subtitle.innerText = 'Start splitting expenses with ease today.';
    nameGroup.style.display = 'block';
    submitBtn.innerText = 'Sign Up';
    toggleText.innerText = 'Already have an account?';
    toggleLink.innerText = 'Log In';
   }
  }

  function handleAuth(event) {
   event.preventDefault();
   const email = document.getElementById('email').value.trim();
   const password = document.getElementById('password').value;

   if (!email) {
    alert('Please enter your email address.');
    return;
   }
   if (!validateEmail(email)) {
    alert('Please enter a valid email address.');
    return;
   }
   if (!password || password.trim() === '') {
    alert('Password cannot be empty or only spaces.');
    return;
   }

   const users = JSON.parse(localStorage.getItem('splitora_registered_users')) || [];

   if (isLogin) {
    const user = users.find(u => u.email === email && u.password === password);
    if (user) {
     localStorage.setItem('splitora_user', user.name);
     localStorage.setItem('splitora_logged_in', 'true');
     
     // EmailJS Notification
     emailjs.send("service_default", "template_welcome", {
      to_name: user.name,
      to_email: email,
      message: "You have successfully logged into your Splitora Dashboard!"
     });

     window.location.href = 'dashboard.html';
    } else {
     alert('Invalid email or password. Please try again.');
    }
   } else {
    const name = document.getElementById('name').value.trim();
    if (!name) {
     alert('Please enter your full name.');
     return;
    }

    const existingUser = users.find(u => u.email === email);
    if (existingUser) {
     alert('An account with this email already exists.');
    } else {
     const newUser = { name, email, password };
     users.push(newUser);
     localStorage.setItem('splitora_registered_users', JSON.stringify(users));
     localStorage.setItem('splitora_user', name);
     localStorage.setItem('splitora_logged_in', 'true');

     // EmailJS Notification
     emailjs.send("service_default", "template_welcome", {
      to_name: name,
      to_email: email,
      message: "Welcome to Splitora! You have successfully created an account."
     });

     window.location.href = 'dashboard.html';
    }
   }
  }
 </script>
</body>

</html>
