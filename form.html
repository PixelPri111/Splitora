<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Join Splitora - Smart Expense Splitting</title>
 <link rel="stylesheet" href="css/form.css">
</head>

<body>
 <a href="index.html" class="back-home">← Back to Home</a>
 <div class="container">
  <div class="logo">💰 Splitora</div>
  <h2 id="form-title">Create Account</h2>
  <p class="subtitle" id="form-subtitle">Start splitting expenses with ease today.</p>

  <form id="auth-form" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
   <div class="form-group" id="name-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="John Doe">
   </div>

   <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="john@example.com" required>
   </div>

   <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" required>
   </div>

   <button type="submit" class="btn-submit" id="submit-btn">Sign Up</button>
  </form>

  <div class="toggle-form">
   <span id="toggle-text">Already have an account?</span>
   <a href="#" id="toggle-link" onclick="toggleAuth()">Log In</a>
  </div>
 </div>

 <script>
  let isLogin = false;

  function toggleAuth() {
   isLogin = !isLogin;
   const title = document.getElementById('form-title');
   const subtitle = document.getElementById('form-subtitle');
   const nameGroup = document.getElementById('name-group');
   const submitBtn = document.getElementById('submit-btn');
   const toggleText = document.getElementById('toggle-text');
   const toggleLink = document.getElementById('toggle-link');

   if (isLogin) {
    title.innerText = 'Welcome Back';
    subtitle.innerText = 'Log in to manage your group expenses.';
    nameGroup.style.display = 'none';
    submitBtn.innerText = 'Log In';
    toggleText.innerText = "Don't have an account?";
    toggleLink.innerText = 'Sign Up';
   } else {
    title.innerText = 'Create Account';
    subtitle.innerText = 'Start splitting expenses with ease today.';
    nameGroup.style.display = 'block';
    submitBtn.innerText = 'Sign Up';
    toggleText.innerText = 'Already have an account?';
    toggleLink.innerText = 'Log In';
   }
  }
 </script>
</body>

</html>
